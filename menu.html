<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menu - Yi Sushi</title>
    <meta

      content="Selaa Yi Sushin menua. Tarjoamme sushia ja kiinalaisia ruokia Loimaalla."

    <meta property="og:title" content="Menu - Yi Sushi" />

      property="og:description"

    />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Main navigation">
        <a class="brand" href="./index.html">Yi Sushi</a>
        <button class="mobile-nav-toggle" type="button" data-translate="mobileMenu">Valikko</button>
        <div class="nav-links">
          <a href="./index.html" data-translate="home">Etusivu</a>
          <a href="./about.html" data-translate="aboutUs">Meistä</a>
          <a href="./menu.html" class="active" data-translate="menu">Menu</a>
          <a href="./location.html" data-translate="location">Sijainti</a>
          <a href="./hours.html" data-translate="openingHours">Aukioloajat</a>
          <a href="./reservation.html" data-translate="reservation">Pöytävaraus</a>
          <a href="./contact.html" data-translate="contact">Yhteystiedot</a>
        </div>
        <div class="lang-switcher" aria-label="Language selection">
          <a href="#" class="lang-active" data-lang="fi">FI</a>
          <span>|</span>
          <a href="#" data-lang="en">EN</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="page-title">
        <p class="eyebrow">Yi Sushi</p>
        <h1 data-translate="menu">Menu</h1>
      </section>

      <section class="page-section">
        <div class="menu-search">
          <input
            type="text"
            id="menu-search-input"
            placeholder="Hae ruokalistalta..."
            data-translate-placeholder="menuSearch"
          />
        </div>
        <div id="menu-container"></div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 Yi Sushi. Heimolinnankatu 6, 32200 Loimaa, Finland.</p>
    </footer>

    <script src="./assets/js/menu-data.js"></script>
    <script src="./assets/js/main.js"></script>
